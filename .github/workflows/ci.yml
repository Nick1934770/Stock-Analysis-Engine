name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io

jobs:
  build-and-test:
    name: Build images + smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          load: true
          tags: stockanalyzer-backend:ci
          cache-from: type=gha,scope=backend
          cache-to:   type=gha,scope=backend,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          load: true
          tags: stockanalyzer-frontend:ci
          cache-from: type=gha,scope=frontend
          cache-to:   type=gha,scope=frontend,mode=max

      - name: Start stack via docker compose
        run: |
          cat > docker-compose.ci.yml <<'EOF'
          services:
            backend:
              image: stockanalyzer-backend:ci
              environment:
                - CACHE_TTL=300
                - ALLOWED_ORIGINS=http://localhost,http://localhost:80
            frontend:
              image: stockanalyzer-frontend:ci
              ports:
                - "8080:80"
              depends_on:
                - backend
          EOF
          docker compose -f docker-compose.ci.yml up -d

      - name: Wait for backend health (via nginx proxy)
        run: |
          for i in {1..30}; do
            if curl -fsS http://localhost:8080/api/health; then
              echo "Backend is healthy"
              exit 0
            fi
            echo "Attempt $i/30 — backend not ready yet, sleeping 2s"
            sleep 2
          done
          echo "Backend never became healthy. Dumping logs:"
          docker compose -f docker-compose.ci.yml logs
          exit 1

      - name: Smoke test frontend root
        run: |
          status=$(curl -o /dev/null -s -w "%{http_code}" http://localhost:8080/)
          echo "Frontend returned HTTP $status"
          [ "$status" = "200" ]

      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.ci.yml down -v

  push-to-ghcr:
    name: Push images to GHCR
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compute lowercase owner (GHCR requires lowercase)
        id: owner
        run: echo "lc=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.lc }}/stockanalyzer-backend:latest
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.lc }}/stockanalyzer-backend:${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to:   type=gha,scope=backend,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.lc }}/stockanalyzer-frontend:latest
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.lc }}/stockanalyzer-frontend:${{ github.sha }}
          cache-from: type=gha,scope=frontend
          cache-to:   type=gha,scope=frontend,mode=max
