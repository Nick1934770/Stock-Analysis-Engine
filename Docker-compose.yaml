services:
  backend:
    build:
      context: ./backend
    environment:
      - NEWS_API_KEY=${NEWS_API_KEY:-}
      - CACHE_TTL=${CACHE_TTL:-300}
      - ALLOWED_ORIGINS=http://localhost,http://localhost:80
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
